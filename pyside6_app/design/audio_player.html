<div class="audio-player" style="border:none; border-radius:0; border-top:1px solid var(--border); flex-shrink: 0;">
      <div class="player-top">
        <div class="player-title"><span>Player</span></div>
      </div>
      
      <div class="player-main" style="padding: 10px 16px;">
        <div class="player-time-display">
          <div class="player-current-time" style="font-size: 24px;">00:02</div>
          <div class="player-total-time">00:04.2</div>
        </div>
        
        <div class="player-waveform-container" style="height: 40px;">
          <div class="player-file-info" style="margin-bottom: 4px;">
            <span>output.wav</span>
            <div class="player-file-badges">
              <span>WAV</span>
              <span>384kbps</span>
              <span>24kHz</span>
            </div>
          </div>
          <div class="player-waveform-track">
            <div class="player-waveform-bars" id="waveform-dense"></div>
            <div class="player-progress-overlay"></div>
          </div>
        </div>
      </div>
      
      <div class="player-controls">
        <button class="player-btn" title="Play/Pause (Space)">⏸</button>
        <button class="player-btn" title="Stop (Esc)">⏹</button>
        <button class="player-btn" title="Previous">⏮</button>
        <button class="player-btn" title="Next">⏭</button>
        
        <div class="player-bottom-info">
          <span>00:00:02 / 00:00:04.2</span>
          <span style="margin:0 4px; opacity:0.3">|</span>
          <span>WAV</span>
          <span>2.0</span>
        </div>
        
        <div class="player-volume">
          <button class="player-btn" style="width:24px;height:24px;font-size:12px;">🔊</button>
          <div class="player-volume-slider">
            <div class="player-volume-fill"></div>
            <div class="player-volume-thumb"></div>
          </div>
          <button class="btn btn-save" style="margin-left: 16px; padding: 6px 12px; font-size: 11px;">
            <span class="btn-icon" style="font-size:12px;">💾</span> Save As…
          </button>
        </div>
      </div>
    </div>
